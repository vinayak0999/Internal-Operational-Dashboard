name: Encord → BigQuery Sync

on:
  schedule:
    - cron: "0 6 * * *"        # Daily at 06:00 UTC
  workflow_dispatch:            # Manual trigger from Actions tab
    inputs:
      client_filter:
        description: 'Comma-separated client names to sync (empty = ALL)'
        required: false
        default: ''

jobs:
  sync:
    name: Sync Encord → BigQuery
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install encord google-cloud-bigquery

      - name: Write Encord SSH key to disk
        run: |
          printf '%s\n' "$ENCORD_SSH_KEY" > /tmp/encord_key
          chmod 600 /tmp/encord_key
        env:
          ENCORD_SSH_KEY: ${{ secrets.DASH_ENCORD_SSH_KEY }}

      - name: Write GCP service account key to disk
        run: printf '%s' "$GCP_SA_KEY" > /tmp/gcp-key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run sync
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          ENCORD_SSH_KEY_PATH: /tmp/encord_key
          ENCORD_DOMAIN: https://api.encord.com
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
          CLIENT_FILTER: ${{ github.event.inputs.client_filter }}
        run: python Internal-Operational-Dashboard/sync/encord_to_bigquery.py
