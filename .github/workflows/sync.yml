name: Encord → BigQuery Sync

on:
  schedule:
    - cron: "*/15 * * * *"   # Every 15 minutes (incremental — only changed projects)
  workflow_dispatch:         # Also allows manual trigger from GitHub Actions tab

jobs:
  sync:
    name: Sync Encord → BigQuery
    runs-on: ubuntu-latest
    timeout-minutes: 30      # Incremental sync: typically 2-10 min per run

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install encord google-cloud-bigquery

      - name: Write Encord EMEA SSH key to disk
        run: |
          printf '%s\n' "$ENCORD_SSH_KEY" > /tmp/encord_key
          chmod 600 /tmp/encord_key
        env:
          ENCORD_SSH_KEY: ${{ secrets.ENCORD_SSH_KEY }}

      - name: Write Encord US SSH key to disk (if set)
        run: |
          printf '%s\n' "$ENCORD_US_SSH_KEY" > /tmp/encord_us_key
          chmod 600 /tmp/encord_us_key
        env:
          ENCORD_US_SSH_KEY: ${{ secrets.ENCORD_US_SSH_KEY }}

      - name: Write GCP service account key to disk
        run: printf '%s' "$GCP_SA_KEY" > /tmp/gcp-key.json
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}

      - name: Run sync
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/gcp-key.json
          ENCORD_SSH_KEY_PATH: /tmp/encord_key
          ENCORD_DOMAIN: https://api.encord.com
          ENCORD_US_SSH_KEY_PATH: /tmp/encord_us_key
          ENCORD_US_DOMAIN: https://api.us.encord.com
          GCP_PROJECT: ${{ secrets.GCP_PROJECT }}
          BQ_DATASET: ${{ secrets.BQ_DATASET }}
        run: python sync/encord_to_bigquery.py
